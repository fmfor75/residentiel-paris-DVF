name: Mise à jour DVF Paris

on:
  schedule:
    - cron: '0 6 15 4 *'
    - cron: '0 6 15 10 *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install requests pandas

      - name: Télécharger et traiter les données DVF Paris
        run: python scripts/process_dvf.py

      - name: Vérifier que le fichier JSON a été généré
        run: |
          ls -lh data/
          python -c "import json; d=json.load(open('data/dvf_paris.json')); print(f'OK — {d[\"meta\"][\"total_mutations\"]} transactions')"

      - name: Commit et push
        run: |
          git config user.name "DVF Bot"
          git config user.email "dvf-bot@github-actions"
          git add data/dvf_paris.json
          git diff --staged --quiet || git commit -m "DVF Paris mis à jour — $(date +'%Y-%m-%d')"
          git push
